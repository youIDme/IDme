{% extends "base.html" %}

{% block title %}IDme — Error{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center flex-grow flex flex-col justify-center">
    <div class="rounded-2xl border border-white/10 bg-white/[0.02] p-8 backdrop-blur-xl shadow-2xl relative">
        <div class="absolute inset-0 bg-gradient-to-tr from-red-500/5 to-purple-500/5 pointer-events-none"></div>
        
        <div class="w-16 h-16 rounded-2xl bg-red-500/10 text-red-400 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        
        <h2 class="text-2xl font-bold text-white mb-2">Something went wrong</h2>
        <p class="text-sm text-gray-400 mb-6 leading-relaxed">
            {% if message %}
                {{ message }}
            {% else %}
                An unexpected error occurred while processing your request. Please try again.
            {% endif %}
        </p>
        
        <a href="/" class="inline-flex items-center justify-center px-6 py-3 bg-white/5 hover:bg-white/10 text-white border border-white/10 font-semibold rounded-xl transition-colors">
            Return Home
        </a>
    </div>
</div>
{% endblock %}
